name: CI

on:
  push:
    branches: [main]
  pull_request:

# web and worker are independent jobs, run in parallel on every push/PR.
# (Add dorny/paths-filter to skip unchanged halves once the repo grows.)
jobs:
  web:
    name: web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage
      - run: npm run build
      # E2E (Playwright) intentionally not in CI yet — needs browsers + a
      # running dev server. Add once the upload→export flow is wired.

  worker:
    name: worker (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements.txt
      - run: pip install -r requirements.txt
      # Syntax + import smoke. STUB mode (no GROQ_API_KEY) so it imports clean.
      - run: python -m py_compile app/*.py
      - run: python -c "from app.main import app; print('worker imports OK')"
      - run: python -m pytest -q
