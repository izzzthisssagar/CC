name: Security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    # gitleaks-action can't get a token on Dependabot PRs → skip (avoids false red).
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
