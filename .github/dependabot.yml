version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Tailwind v4 is a breaking rewrite (PostCSS plugin moved, CSS-first
      # config). Stay on v3 until a deliberate migration; don't auto-PR majors.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: pip
    directory: /worker
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
